name: aura_app
description: "Team building fun app."

publish_to: 'none' 

version: 1.0.0+10

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^7.2.0
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^8.1.0
  get_it: ^9.2.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.5
  flutter_localizations:
    sdk: flutter
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^22.0.0
  firebase_storage: ^12.4.10
  image_picker: ^1.2.2
  geolocator: ^13.0.0
  timezone: ^0.11.0
  # Ships a (no-op) Android plugin; kept here, not in dev_dependencies, so its
  # native module is on the release classpath. As a dev_dependency, Flutter
  # excludes it from release Gradle builds but still emits it in
  # GeneratedPluginRegistrant.java → `package ... does not exist` at javac.
  flutter_native_splash: ^2.4.7
  flutter_timezone: ^5.1.0
  firebase_remote_config: ^5.5.0
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/brand/

  # Variable fonts (bundled — no runtime download). Weight handled by fontWeight.
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf

